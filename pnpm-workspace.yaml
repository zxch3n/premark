packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  "@napi-rs/canvas": ^0.1.97
  "@types/node": ^25
  typescript: ^6
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer

overrides:
  vite: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
